# ── Upstream ─────────────────────────────────────────────────────────────────
# "backend" resolves via Docker internal DNS to the backend service.
# keepalive reuses connections instead of opening a new TCP socket per request.
upstream ocipulse_api {
    server backend:8000;
    keepalive 32;
}

# ── Server ────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://ocipulse_api;

        # Required for keepalive upstream connections
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";

        # Forward real client info to FastAPI
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — tune if OCI SDK calls are slow
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Don't buffer — stream JSON responses straight to the browser
        proxy_buffering    off;

        # Return structured JSON instead of nginx's default HTML error page.
        # The frontend ConnectionBanner parses this to show the correct message.
        error_page 502 503 504 =503 @api_backend_error;
    }

    location @api_backend_error {
        default_type application/json;
        add_header   Access-Control-Allow-Origin * always;
        return 503 '{"detail":"Backend service unavailable. Check that the backend container is running and healthy.","status":503,"mock_mode":false}';
    }

    # ── Static assets (JS/CSS bundles) ────────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
        expires    7d;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── SPA fallback — must be last ───────────────────────────────────────────
    location / {
        try_files  $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Compression ───────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    application/x-javascript text/javascript text/xml
                    application/xml+rss image/svg+xml;
}
